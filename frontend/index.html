<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubTrack — จัดการ Subscription ของคุณ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d12;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --border: #2a2a3a;
  --accent: #7c6fff;
  --accent2: #9b8aff;
  --green: #00d4aa;
  --red: #ff4d6d;
  --muted: #8888aa;
  --text: #f0f0ff;
  --radius: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* AUTH */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;\background:radial-gradient(ellipse at 50% 0%,1(a1630 0%,var(--bg) 70%);padding:20px}
.auth-box{width:100%;max-width:420px;}
.auth-logo { text-align:center;margin-bottom:32px; }
.auth-logo-mark {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  margin: 0 auto 14px;
  box-shadow: 0 8px 24px rgba(124, 111, 255, .35);
}
.auth-logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.9rem;
  background: linear-gradient(135deg, #fff, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.auth-logo p {
  color: var(--muted);
  font-size: .88rem;
  margin-top: 4px;
}
